name: Dependabot auto-merge (delt)

# Delt workflow for alle tiltakspenger-repoene - se README.md i denne mappa for konvensjoner og plasseringsbegrunnelse.
# Kalles fra repoenes dependabot-auto-merge.yml med `uses: navikt/tiltakspenger/.github/workflows/dependabot-auto-merge.yml@main`.
# Kalleren må gi jobben `contents: write` (merge av PR-en) og `pull-requests: write` (gh pr merge), og sende secrets eksplisitt - aldri `secrets: inherit`.
#
# Sikkerhetsdesign - hvorfor fire jobber og ikke én (jf. sikkerhetsreview-funn F3, navikt/tiltakspenger#31):
# Byggesteget kjører tredjepartskode: byggeskript og tester fra den bumpede avhengigheten.
# Untrusted kode og write-token skal aldri eksistere i samme jobb - prosesser på runneren kjører som samme bruker som Runner-prosessen og kan i praksis nå jobbens GITHUB_TOKEN (f.eks. via prosessminne), uavhengig av om tokenet er i env.
# Derfor: metadata (lese-token) -> bygg (kun contents: read) -> merge (write-token, men ingen checkout og dermed ingen tredjepartskode på runneren), pluss varsle-feil (kun webhook-secreten, intet token).
# Callerens jobb-grant er taket for alle jobbene her; hver jobb nedgraderer individuelt til sitt faktiske behov.
# Splitten er usynlig for callerne: de gir fortsatt ett samlet grant og trenger aldri endres når jobbstrukturen her endres.

on:
  workflow_call:
    inputs:
      java-version:
        description: Java-versjon for byggesteget
        required: false
        type: string
        default: '25'
    secrets:
      SLACK_VARSEL_WEBHOOK_URL:
        description: "Webhook for varsler til team-kanalen (sendes eksplisitt fra kalleren)"
        required: true

# Minste privilegium: toppnivået nullstiller token-rettighetene for jobber som ikke deklarerer egne.
permissions: {}

jobs:
  metadata:
    runs-on: ubuntu-latest
    # Gaten ligger kun på denne jobben: alle andre jobber henger på den via `needs`, så skippes den, skippes alt nedstrøms.
    # Begge sjekkene trengs: `user.login` binder PR-forfatteren, `github.actor` binder hvem som utløste kjøringen.
    # Uten actor-sjekken ville en push fra en annen bruker til dependabot-branchen (synchronize-event) fortsatt passert gaten og blitt auto-merget.
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' && github.actor == 'dependabot[bot]' }}
    # fetch-metadata leser kun PR-data - jobben trenger ingen skrivetilgang.
    permissions:
      pull-requests: read
    # Outputs er kontrakten til jobbene nedstrøms; alt de trenger av metadata hentes herfra, aldri på nytt.
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
      package-ecosystem: ${{ steps.metadata.outputs.package-ecosystem }}
      dependency-names: ${{ steps.metadata.outputs.dependency-names }}
      previous-version: ${{ steps.metadata.outputs.previous-version }}
      new-version: ${{ steps.metadata.outputs.new-version }}
    env:
      PR_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # Major-varselet bor i denne jobben fordi den ikke kjører tredjepartskode - webhook-secreten eksponeres aldri for en jobb som gjør det.
      # All kontekst går via env (aldri ${{ }} direkte i run), og payloaden bygges med jq så verdier med spesialtegn ikke kan knekke/injisere JSON-en.
      # curl -sSf gjør at et avvist webhook-kall (f.eks. rotert URL) feiler steget synlig i stedet for å forsvinne stille.
      - name: Notify Slack on new major version
        if: steps.metadata.outputs.update-type == 'version-update:semver-major' && steps.metadata.outputs.package-ecosystem != 'github_actions' && github.event.action != 'synchronize'
        run: |
          payload=$(jq -n --arg pretext "[$REPO_NAME] Ny major dependency versjon!" --arg commit "<https://github.com/$REPO/commit/$PR_SHA|$PR_SHA>" --arg dep "$DEPENDENCY_NAME $VERSION_CHANGE" '{attachments: [{pretext: $pretext, color: "info", fields: [{title: "Commit", value: $commit, short: false}, {title: "Dependency", value: $dep, short: false}]}]}')
          curl -sSf -X POST --data-urlencode "payload=$payload" "$WEBHOOK_URL"
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          DEPENDENCY_NAME: ${{ steps.metadata.outputs.dependency-names }}
          VERSION_CHANGE: "${{ steps.metadata.outputs.previous-version }} -> ${{ steps.metadata.outputs.new-version }}"

  bygg:
    runs-on: ubuntu-latest
    needs: metadata
    # Actions-bumps har ingenting å bygge; gradle-bygget gjelder kun kodeavhengigheter.
    if: ${{ needs.metadata.outputs.package-ecosystem != 'github_actions' }}
    # Denne jobben kjører untrusted kode (avhengighetens byggeskript/tester) og skal derfor aldri ha mer enn lesetilgang.
    # Utvid ikke rettighetene her - trenger et nytt steg skrivetilgang, hører det hjemme i en egen jobb uten checkout.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Ikke la tokenet ligge igjen i .git/config - byggesteget kjører kode fra den bumpede avhengigheten.
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      # --configuration-cache matcher dagens praksis i alle backend-repoene; i repo der config cache er på via gradle.properties er flagget harmløst.
      - name: Build and run tests
        run: ./gradlew build --configuration-cache

  merge:
    runs-on: ubuntu-latest
    needs: [ metadata, bygg ]
    # Kun patch-bumps merges automatisk; minor/major krever menneske.
    # Implisitt success() på needs gjør at github_actions-økosystemet (der bygg skippes) aldri når hit - samme policy som før splitten.
    if: ${{ needs.metadata.outputs.update-type == 'version-update:semver-patch' }}
    # Eneste jobben med write-token - og den har bevisst ingen checkout: ingen kildekode, ingen bygg, ingen tredjepartskode på runneren.
    # Kun gh CLI mot GitHub-API-et.
    permissions:
      contents: write
      pull-requests: write
    env:
      PR_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      # Merger direkte, uten --auto: main har ingen påkrevde sjekker, og da avviser GitHub auto-merge.
      # Bygget har allerede kjørt grønt i jobben over (needs).
      # --match-head-commit lukker TOCTOU-vinduet mellom bygg og merge: GitHub avviser mergen hvis branch-head har flyttet seg siden commiten vi bygde.
      # Merge med GITHUB_TOKEN trigger ingen push-workflows på main - ingen publisering, image-bygg eller deploy, avhengig av hva repoet gjør der.
      # Merger et menneske/agent PR-en selv (GitHub-knappen eller gh CLI), kjører push-workflowene som normalt - da er noen på jobb og kan følge opp.
      - name: Auto-merge changes from Dependabot
        run: gh pr merge --squash --match-head-commit "$PR_SHA" "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  varsle-feil:
    runs-on: ubuntu-latest
    needs: [ metadata, bygg, merge ]
    # failure() er påkrevd: uten en statusfunksjon kjører jobben kun når alle needs lyktes.
    # Majors varsles allerede av major-steget i metadata-jobben, og synchronize-events skal ikke støye.
    if: ${{ failure() && needs.metadata.outputs.update-type != 'version-update:semver-major' && github.event.action != 'synchronize' }}
    # Jobben trenger ikke tokenet i det hele tatt - kun webhook-secreten.
    permissions: {}
    env:
      PR_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      # Metadata-outputs kan være tomme hvis metadata-jobben selv feilet - da peker commit-lenken uansett til rett PR.
      - name: Notify Slack in case of merge failure
        run: |
          payload=$(jq -n --arg pretext "[$REPO_NAME] Dependabot auto-merge feilet :cry:" --arg commit "<https://github.com/$REPO/commit/$PR_SHA|$PR_SHA>" --arg dep "$DEPENDENCY_NAME $VERSION_CHANGE" '{attachments: [{pretext: $pretext, color: "danger", fields: [{title: "Commit", value: $commit, short: false}, {title: "Dependency", value: $dep, short: false}]}]}')
          curl -sSf -X POST --data-urlencode "payload=$payload" "$WEBHOOK_URL"
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          DEPENDENCY_NAME: ${{ needs.metadata.outputs.dependency-names }}
          VERSION_CHANGE: "${{ needs.metadata.outputs.previous-version }} -> ${{ needs.metadata.outputs.new-version }}"

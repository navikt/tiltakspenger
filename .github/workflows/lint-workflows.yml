name: Lint workflows (delt)

# Delt workflow for alle tiltakspenger-repoene - se README.md i denne mappa for konvensjoner og plasseringsbegrunnelse.
# Linter repoets GitHub Actions-workflows: actionlint (skjema, uttrykkstypesjekk og shellcheck av run-blokker) og zizmor (sikkerhetsrevisjon).
# Kalles med `uses: navikt/tiltakspenger/.github/workflows/lint-workflows.yml@main`; metarepoet selv kaller med lokal sti slik at PR-er testes med sin egen versjon.
# Kalleren må gi jobbene `contents: read`.

on:
  workflow_call:
    inputs:
      zizmor-blokkerende:
        description: "Om zizmor-funn skal feile jobben - hele flåten kjører blokkerende, så false er unntaket (repo som ennå ikke har nedfelt unntakene sine i zizmor.yml)"
        required: false
        type: boolean
        default: true
      zizmor-mal-sjekk:
        description: "Om repoets .github/zizmor.yml skal kreves lik malen i metarepoet (skru av kun ved begrunnet avvik)"
        required: false
        type: boolean
        default: true
      dependabot-mal:
        description: "Hvilken dependabot-mal repoets .github/dependabot.yml skal kreves lik: auto (detekter fra repo-innhold), gradle, node, actions eller ingen (skru av kun ved begrunnet avvik)"
        required: false
        type: string
        default: 'auto'

# Minste privilegium: toppnivået nullstiller token-rettighetene for jobber som ikke deklarerer egne.
permissions: {}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Offisielt actionlint-image pinnet på digest (tags kan flyttes, digests er innholdsadresserte); Dependabot bumper docker://-referanser.
      # Kjører også shellcheck på alle run-blokkene.
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

  # GitHub kan ikke lenke config-filer på tvers av repo (dependabot.yml/zizmor.yml må fysisk finnes per repo, uten include-mekanisme).
  # Drift-vakten gir lenke-semantikk i stedet: repoets kopi må være lik malen i metarepoet, ellers feiler linten.
  # Repo med begrunnet avvik setter `zizmor-mal-sjekk: false` i calleren, med kommentar.
  konfig-drift:
    runs-on: ubuntu-latest
    if: ${{ inputs.zizmor-mal-sjekk }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Sammenlign zizmor.yml med malen i metarepoet
        run: |
          curl -sSf -o /tmp/mal-zizmor.yml https://raw.githubusercontent.com/navikt/tiltakspenger/main/.github/maler/zizmor.yml
          if ! diff -u /tmp/mal-zizmor.yml .github/zizmor.yml; then
            echo "::error::.github/zizmor.yml avviker fra malen i metarepoet (.github/maler/zizmor.yml). Oppdater kopien, eller sett zizmor-mal-sjekk: false i calleren med begrunnelse."
            exit 1
          fi

  # Samme lenke-semantikk for dependabot.yml: repoets kopi må være lik riktig mal i metarepoet.
  # Mal velges automatisk fra repo-innhold (gradle-fil -> gradle, package.json -> node, ellers actions), eller eksplisitt via `dependabot-mal`.
  # Repo med begrunnet avvik (f.eks. registries-blokk) setter `dependabot-mal: ingen` i calleren, med kommentar.
  dependabot-drift:
    runs-on: ubuntu-latest
    if: ${{ inputs.dependabot-mal != 'ingen' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Sammenlign dependabot.yml med malen i metarepoet
        run: |
          mal="$DEPENDABOT_MAL"
          if [ "$mal" = auto ]; then
            if [ -f build.gradle.kts ] || [ -f build.gradle ]; then
              mal=gradle
            elif [ -f package.json ]; then
              mal=node
            else
              mal=actions
            fi
          fi
          curl -sSf -o /tmp/mal-dependabot.yml "https://raw.githubusercontent.com/navikt/tiltakspenger/main/.github/maler/dependabot-$mal.yml"
          if ! diff -u /tmp/mal-dependabot.yml .github/dependabot.yml; then
            echo "::error::.github/dependabot.yml avviker fra malen i metarepoet (.github/maler/dependabot-$mal.yml). Oppdater kopien, eller sett dependabot-mal: ingen i calleren med begrunnelse."
            exit 1
          fi
        env:
          DEPENDABOT_MAL: ${{ inputs.dependabot-mal }}

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Sikkerhetsrevisjon av workflowene: template injection, permissions, pinning, bot-gating, cache poisoning m.m.
      # Blokkerende som default (policyen fleet-wide); repo som ennå ikke har nedfelt unntakene sine setter `zizmor-blokkerende: false` midlertidig.
      # `annotations` i stedet for `advanced-security` gir funn som PR-annotasjoner uten behov for `security-events: write`.
      - name: zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        continue-on-error: ${{ !inputs.zizmor-blokkerende }}
        with:
          version: "1.27.0"
          persona: regular
          # Informational-funn (f.eks. forslag om å bytte action mot innebygd gh-kommando) skal informere, ikke blokkere.
          min-severity: low
          advanced-security: "false"
          annotations: "true"

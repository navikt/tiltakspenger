name: Test og bygg node (delt)

# Delt workflow for alle tiltakspenger-repoene - se README.md i denne mappa for konvensjoner og plasseringsbegrunnelse.
# Test-/verifiseringsgate for TypeScript/JavaScript-repo: installerer avhengigheter og kjører repoets sjekker (lint/tsc/test/build via `kommando`-input).
# Bygger IKKE image - frontendenes image-bygg er bevisst lokale (ENV-matrise, env-filer, CDN-opplasting); dette er gaten for PR-er og feature-brancher.
# Pakkehåndterer detekteres automatisk fra lockfila (pnpm-lock.yaml -> pnpm, ellers npm ci), slik at npm->pnpm-migreringen (jf. nais-doc) ikke krever caller-endringer.
# Kalleren må gi jobben `contents: read`, og sende secrets eksplisitt - aldri `secrets: inherit`.

on:
  workflow_call:
    inputs:
      node-version:
        description: Node-versjon for byggesteget
        required: false
        type: string
        default: '24'
      kommando:
        description: "Sjekkene som kjøres etter installasjon (typisk lint/tsc/test/build - repoene har ulike scripts); $PAKKEHANDTERER er npm eller pnpm"
        required: false
        type: string
        default: '"$PAKKEHANDTERER" run lint --if-present'
    secrets:
      SLACK_VARSEL_WEBHOOK_URL:
        description: "Webhook for varsel ved feil på main (sendes eksplisitt fra kalleren)"
        required: true
      READER_TOKEN:
        description: "Token med read:packages for @navikt-pakker fra GitHub Packages (npm.pkg.github.com)"
        required: true

# Minste privilegium: toppnivået nullstiller token-rettighetene for jobber som ikke deklarerer egne.
permissions: {}

jobs:
  bygg:
    runs-on: ubuntu-latest
    # Fork-PR-er: pushes i forks trigger aldri workflows i base-repoet, så gate-callerne trigger også på pull_request.
    # Guarden her slipper kun gjennom fork-PR-events - interne brancher (også Dependabots) dekkes av push-triggeren.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Ikke la tokenet ligge igjen i .git/config - stegene kjører avhengigheters kode.
          persist-credentials: false
      # Lockfila er fasit for pakkehåndterer: pnpm-lock.yaml -> pnpm, ellers npm.
      - name: Detekter pakkehåndterer
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          fi
      # pnpm-versjonen leses fra packageManager-feltet i package.json (konvensjon i pnpm-repoene våre).
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: steps.pm.outputs.manager == 'pnpm'
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://npm.pkg.github.com
      # READER_TOKEN trengs for @navikt-pakker fra GitHub Packages; setup-node skriver .npmrc, som pnpm leser samme sted.
      # Fork-PR-kjøringer får ingen secrets - da faller vi tilbake på github.token (read-only), som kan lese public pakker.
      - name: Install dependencies
        run: |
          if [ "$PAKKEHANDTERER" = pnpm ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN || github.token }}
          PAKKEHANDTERER: ${{ steps.pm.outputs.manager }}
      # Kommandoen går via env og eval, ikke ${{ }} i run - samme injection-hygiene som for all annen kontekst (input-en er repo-styrt, men mønsteret skal være konsekvent).
      - name: Kjør sjekkene
        run: eval "$KOMMANDO"
        env:
          KOMMANDO: ${{ inputs.kommando }}
          PAKKEHANDTERER: ${{ steps.pm.outputs.manager }}
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN || github.token }}
      # All kontekst går via env (aldri ${{ }} direkte i run), og payloaden bygges med jq så verdier med spesialtegn ikke kan knekke/injisere JSON-en.
      # curl -sSf gjør at et avvist webhook-kall feiler steget synlig i stedet for å forsvinne stille.
      # Webhooken er en app-basert Slack-webhook: den krever JSON-body med Content-Type: application/json (legacy payload=-form ga HTTP 422).
      - name: Varsle Slack ved feil på main
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          payload=$(jq -n --arg text "[$REPO_NAME] Build failed :cry: $AUTHOR - <https://github.com/$REPO/commit/$COMMIT_SHA|$COMMIT_SHA>" '{text: $text}')
          curl -sSf -X POST -H 'Content-type: application/json' --data "$payload" "$WEBHOOK_URL"
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          AUTHOR: ${{ github.event.pusher.name }}
          COMMIT_SHA: ${{ github.sha }}

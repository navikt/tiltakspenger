name: Lint workflows

on:
  pull_request:
    paths:
      - '.github/**'
  push:
    branches: [ main ]
    paths:
      - '.github/**'

# Minste privilegium: toppnivået nullstiller alle token-rettigheter, hver jobb deklarerer eksplisitt det den trenger.
permissions: {}

jobs:
  lint:
    # Lokal sti (ikke @main) slik at endringer i den delte workflowen testes med PR-ens egen versjon.
    permissions:
      contents: read
    uses: ./.github/workflows/lint-workflows.yml
    with:
      # Metarepoets zizmor.yml er bevisst et supersett av malen (bot-conditions-unntak for de delte workflowene bor her).
      zizmor-mal-sjekk: false
      # Malene bor her, og metarepoets dependabot.yml er bevisst kun github-actions (auto ville krevd gradle-malen pga. rot-gradlefila).
      dependabot-mal: ingen

name: CodeQL gradle (delt)

# Delt workflow for alle tiltakspenger-repoene - se README.md i denne mappa for konvensjoner og plasseringsbegrunnelse.
# CodeQL-analyse for Kotlin/JVM-repo med manuelt gradle-bygg.
# Kalleren eier trigger (schedule/workflow_dispatch) og concurrency-gruppa - en delt workflow lager ingen egen run.
# Kalleren må gi jobben `contents: read` + `actions: read` + `security-events: write` (opplasting til code scanning).

on:
  workflow_call:
    inputs:
      java-version:
        description: Java-versjon for byggesteget
        required: false
        type: string
        default: '25'

# Minste privilegium: toppnivået nullstiller token-rettighetene for jobber som ikke deklarerer egne.
permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-and-quality
          config: |
            query-filters:
              - exclude:
                  problem.severity:
                    - recommendation
      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      # Kun kompilering - CodeQL trenger klassene, ikke testkjøring; cache-flaggene sikrer at all kode faktisk kompileres i denne kjøringen.
      - name: Build
        run: ./gradlew clean classes --no-build-cache --no-configuration-cache
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:java-kotlin"
